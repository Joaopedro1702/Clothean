<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="stylePadrao.css">
    <link rel="stylesheet" href="styleResposivo.css">

<style>
    html{
        height: 100%;
    }

    .dados-login{
        height: 50%;
        width: 250px;
        display: flex;
        flex-direction: column;
        
    }

    form{
        display: flex;
        justify-content: center;
    }

    .facebook{
        width: 25px;
    
    }

    .loginCom{
        text-align: center;
    }

    button{ 
        width: 100%;
        background-color: #BDFFA6;
        color: #3420E6;
        border: none;
    }
    .botoes{
        display: flex;
        padding: 2%;

    }

    .btnEntrar{
        margin-right: 10%;
    }

    main{
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    body{
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
    }

    footer{
        bottom: 0;
        flex-direction: column;
    }

</style>

</head>
<body>
    <header>
    
    <div class="logo">
        <a href="index.html">
            <img src="image/logo.png" alt="Logo da Clothean">
        </a>
    </div>

    <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav id="navMenu">
        <ul class="container">
            <li><a href="#">Como funcionamos</a></li>
            <li><a href="#">Preços e Serviços</a></li>
            <li><a href="#">Sobre nós</a></li>
            
        </ul>
    </nav>

    <div class="acao" id="acaoMenu">
        
        <button>Reservar</button>
    </div>

    
    </header>
    <main>
        <form action="">
    <div class="dados-login">
        <label for="">Email:</label>
        <input type="text" name="email" id="email" placeholder="Digite seu Email...">
        <label for="">Senha:</label>
        <input type="text" name="senha" id="senha" placeholder="Digite sua Senha...">

        <div class="botoes">
            <button class="btnEntrar">Entrar</button>
            <button class="btnCadastro">Cadastre-se</button>
        </div>
    </div>
        </form>

    <div class="loginCom">
        <h3>Login com</h3>
       <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Logo da Google"></a>
        <a href="#"><img src="image/facebookicon (1).png" alt="Logo do facebook" class="facebook"></a>
        
    </div>
    </main>
    <footer>
    <div class="footer-container">
        <section class="footer-contato">
            <h3>Fale conosco</h3>
            <address>
                <div class="contato">
                    <img src="image/phone-call.png" alt="Telefone para contato (11) 99999-9999">
                    <a href="11999999999">(11) 99999-9999</a>
                </div>
                <div class="email">
                    <img src="image/email.png" alt="email SAC: clotheansac@clothean.com">
                    <a href="clotheansac@clothean.com">clotheansac@clothean.com</a>
                </div>
            </address>
        </section>

        <nav class="footer-col" aria-label="Nossas redes sociais">
            <h3>Nos Siga</h3>
            <div class="social-icons">
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram"></a>
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_icon.svg" alt="Logo facebook" class="face"></a>
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg" alt="LinkedIn"></a>
            </div>
        </nav>

    </div>

    <section class="footer-barra-final">
        <small>© 2026 Clothean</small>
    </section>

</footer>
</body>
</html>
