<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="stylePadrao.css">
    <link rel="stylesheet" href="styleResposivo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<style>
    html{
        height: 100%;
    }

    .dados-login{
        height: 50%;
        width: 250px;
        display: flex;
        flex-direction: column;
        
    }

    form{
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .facebook{
        width: 25px;
    
    }

    .loginCom{
        text-align: center;
    }

    button{ 
        width: 100%;
        background-color: #BDFFA6;
        color: #3420E6;
        border: none;
        
    }
    .botoes{
        display: flex;
        padding: 2%;
        gap: 5px;
    }

    .btnEntrar{
        margin-right: 10%;
    }

    main{
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    body{
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
    }

    footer{
        bottom: 0;
        flex-direction: column;
    }

    

</style>

</head>
<body>
    <header>
    
    <div class="logo">
        <a href="index.html">
            <img src="image/logo.png" alt="Logo da Clothean">
        </a>
    </div>

    <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">Menu</button>

<div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions" aria-labelledby="offcanvasWithBothOptionsLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasWithBothOptionsLabel">Backdrop with scrolling</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="navbar">
        <li class="nav-item"><a class="nav-link" href="#">Como funcionamos</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Sobre nós</a></li>
        <li class="nav-item"><a class="nav-link nav-login" href="#">Login</a></li>
        <li class="nav-item mt-3">
            <button class="btn-reservar w-100">Reservar</button>
        </li>
    </ul>
  </div>
</div>

    
    </header>
    <main>
        <form action="">
    <div class="form-floating mb-3">
    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
    <label for="floatingInput">Email address</label>
</div>
<div class="form-floating">
    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
    <label for="floatingPassword">Password</label>
</div>

<div class="botoes">
    
<button type="button" class="btn btn-outline-primary">Entrar</button>

<button type="button" class="btn btn-outline-success">Cadastrar</button>

</div>

</form>

    <div class="loginCom">
        <h3>Login com</h3>
        <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Logo da Google"></a>
        <a href="#"><img src="image/facebookicon (1).png" alt="Logo do facebook" class="facebook"></a>
        
    </div>
    </main>
    <footer>
    <div class="footer-container">
        <section class="footer-contato">
            <h3>Fale conosco</h3>
            <address>
                <div class="contato">
                    <img src="image/phone-call.png" alt="Telefone para contato (11) 99999-9999">
                    <a href="11999999999">(11) 99999-9999</a>
                </div>
                <div class="email">
                    <img src="image/email.png" alt="email SAC: clotheansac@clothean.com">
                    <a href="clotheansac@clothean.com">clotheansac@clothean.com</a>
                </div>
            </address>
        </section>

        <nav class="footer-col" aria-label="Nossas redes sociais">
            <h3>Nos Siga</h3>
            <div class="social-icons">
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram"></a>
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_icon.svg" alt="Logo facebook" class="face"></a>
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg" alt="LinkedIn"></a>
            </div>
        </nav>

    </div>

    <section class="footer-barra-final">
        <small>© 2026 Clothean</small>
    </section>

</footer>
</body>
</html>
