<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothean</title>
    <link rel="stylesheet" href="stylePadrao.css">
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="image/logo.png" alt="Logo da Clothean">
        </a>
    </div>

    <nav>
        <ul class="container">
            <li><a href="#">Como funcionamos</a></li>
            <li><a href="#">Preços e Serviços</a></li>
            <li><a href="#">Sobre nós</a></li>
        </ul>
    </nav>

    <div class="acao">
        <a href="#">Login</a>
        <button>Reservar</button>
    </div>
</header>

<main>
    <section class="hero">

        <div class="texto">
            <h1>Lavanderia com entrega em até 24 horas</h1>
            <h2>Rápido, prático e do jeito que você precisa</h2>
        </div>

        <div class="banner-mulher">

            <!-- fundo verde -->
            <div class="blob"></div>

            <!-- imagem principal -->
            <img src="image/roupa-removebg-preview.png"
                 alt="Mulher com roupas limpas"
                 class="mulher">

            <!-- bolhas -->
            <img src="image/bolha.png" class="bolha b1" alt="">
            <img src="image/bolha.png" class="bolha b2" alt="">
            <img src="image/bolha.png" class="bolha b3" alt="">

        </div>

    </section>
</main>

</body>
</html>
